# ============================================================
# INDIAN GAP PREDICTION BOT — Daily Pipeline
# Runs between 2:00 PM - 3:20 PM IST
# IST = UTC + 5:30
# So 2:00 PM IST = 08:30 UTC
#    3:20 PM IST = 09:50 UTC
# ============================================================

name: Daily Gap Prediction Pipeline

on:
  # Live daily run — triggers at 2:00 PM IST (08:30 UTC)
  schedule:
    - cron: "30 8 * * 1-5"   # Mon-Fri only (Indian market days)

  # Manual trigger for backtest and debugging
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode: live or backtest"
        required: true
        default: "live"
        type: choice
        options:
          - live
          - backtest

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 80      # Hard cutoff before 3:25 PM IST deadline

    env:
      EMAIL_SENDER:   ${{ secrets.EMAIL_SENDER }}
      EMAIL_APP_PASS: ${{ secrets.EMAIL_APP_PASS }}
      EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
      RUN_MODE:       ${{ github.event.inputs.mode || 'live' }}

    steps:
      # -----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # -----------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -----------------------------------------------------------------
      - name: Verify installed packages
        run: |
          echo "=== Installed packages ==="
          pip show nsepythonserver || echo "nsepythonserver NOT found"
          python -c "import nsepythonserver; print('All exports:', dir(nsepythonserver))" || echo "nsepythonserver import FAILED"

      # -----------------------------------------------------------------
      - name: Create runtime directories
        run: |
          mkdir -p data/raw data/processed logs

      # -----------------------------------------------------------------
      - name: Step 1 — Data Collection
        run: |
          echo "=== STEP 1: Data Collection | mode=$RUN_MODE ==="
          python src/data_collector.py

      # -----------------------------------------------------------------
      # Future steps (uncomment as phases are completed)
      #
      # - name: Step 2 — Feature Engineering
      #   run: python src/feature_engineering.py
      #
      # - name: Step 3 — Regime Detection
      #   run: python src/regime_detector.py
      #
      # - name: Step 4 — Probability Model
      #   run: python src/probability_model.py
      #
      # - name: Step 5 — Option Selector + Signal
      #   run: python src/option_selector.py
      #
      # - name: Step 6 — Send Email Signal
      #   run: python src/main.py --send-signal

      # -----------------------------------------------------------------
      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7

      # -----------------------------------------------------------------
      - name: Upload raw data as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raw-data-${{ github.run_id }}
          path: data/raw/
          retention-days: 7
